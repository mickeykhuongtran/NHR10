<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>Nextwaves UHF RFID Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Inter', 'sans-serif'],
              mono: ['SFMono-Regular', 'SF Mono', 'Roboto Mono', 'Roboto', 'monospace'],
            },
            colors: {
              cyan: {
                400: '#22d3ee',
                500: '#06b6d4',
                600: '#0891b2',
                900: '#164e63',
              },
              ui: {
                bg: '#F9FAFB',        /* Light Gray Background */
                card: '#FFFFFF',      /* White Card */
                cardHover: '#F3F4F6', /* Gray-100 */
                border: '#E2E8F0',    /* Slate-200 */
                text: '#0F172A',      /* Slate-900 */
                subtext: '#64748B'    /* Slate-500 */
              }
            },
            boxShadow: {
              'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
              'soft-lg': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025)',
            }
          }
        }
      }
    </script>
    <style>
      html, body {
        position: fixed;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        background-color: #F7FCFD;
        color: #0F172A;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(118deg, rgba(82, 199, 218, 0.16) 0%, rgba(255, 255, 255, 0) 36%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, rgba(240, 251, 253, 0.9) 100%);
        pointer-events: none;
        z-index: -1;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94A3B8; 
      }

      .app-space {
        position: relative;
        isolation: isolate;
        background:
          linear-gradient(135deg, #FFFFFF 0%, #F3FCFE 48%, #FFFFFF 100%);
      }

      .app-space::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(82, 199, 218, 0.10), rgba(255, 255, 255, 0) 34%, rgba(82, 199, 218, 0.08)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(235, 250, 253, 0.72));
      }

      .soft-glass,
      .glass-panel {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.62));
        border: 1px solid rgba(82, 199, 218, 0.28);
        box-shadow:
          0 24px 70px rgba(18, 78, 90, 0.08),
          0 1px 0 rgba(255, 255, 255, 0.78) inset;
        backdrop-filter: blur(22px) saturate(165%);
        -webkit-backdrop-filter: blur(22px) saturate(165%);
      }

      .soft-glass-strong {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.68));
        border-color: rgba(82, 199, 218, 0.30);
        box-shadow:
          0 18px 46px rgba(18, 78, 90, 0.07),
          0 1px 0 rgba(255, 255, 255, 0.9) inset;
        backdrop-filter: blur(24px) saturate(170%);
        -webkit-backdrop-filter: blur(24px) saturate(170%);
      }

      .soft-surface {
        background: rgba(255, 255, 255, 0.56);
        border-color: rgba(82, 199, 218, 0.20);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85) inset;
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
      }

      .soft-table-head {
        background: rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(18px) saturate(155%);
        -webkit-backdrop-filter: blur(18px) saturate(155%);
      }

      .soft-table-row {
        background: rgba(255, 255, 255, 0.62);
      }

      .soft-table-row:hover {
        background: rgba(255, 255, 255, 0.84);
      }

      .seven-segment {
        font-family: "Orbitron", "DS-Digital", "Seven Segment", "SFMono-Regular", monospace;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
        font-weight: 700;
        text-shadow:
          0 0 12px rgba(82, 199, 218, 0.18),
          0 1px 0 rgba(255, 255, 255, 0.75);
      }

      @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .soft-glass,
        .soft-glass-strong,
        .soft-surface,
        .soft-table-head {
          background: #FFFFFF;
        }
      }
      
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #CBD5E1 transparent;
      }

      .scrollbar-none {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .scrollbar-none::-webkit-scrollbar {
        display: none;
      }

      button,
      input,
      select,
      textarea {
        touch-action: manipulation;
      }

      /* Light system theme adapter for legacy dark utility classes. */
      .bg-slate-950 { background-color: #F5F5F7 !important; }
      .bg-slate-900,
      .bg-slate-900\/40,
      .bg-slate-900\/50 { background-color: rgba(255, 255, 255, 0.86) !important; }
      .bg-slate-800,
      .bg-slate-800\/30,
      .bg-slate-800\/50 { background-color: #F5F5F7 !important; }
      .bg-cyan-950\/30 { background-color: rgba(0, 122, 255, 0.10) !important; }
      .bg-purple-950\/30 { background-color: rgba(175, 82, 222, 0.10) !important; }
      .bg-emerald-950\/30 { background-color: rgba(52, 199, 89, 0.10) !important; }
      .bg-red-950\/30 { background-color: rgba(255, 59, 48, 0.10) !important; }
      .bg-black { background-color: #1C1C1E !important; }

      .border-slate-800,
      .border-slate-800\/30,
      .border-slate-800\/50,
      .border-slate-700 { border-color: #D2D2D7 !important; }
      .border-cyan-900\/50 { border-color: rgba(0, 122, 255, 0.18) !important; }
      .border-purple-900\/50 { border-color: rgba(175, 82, 222, 0.18) !important; }
      .border-emerald-900\/50 { border-color: rgba(52, 199, 89, 0.18) !important; }
      .border-red-900\/50 { border-color: rgba(255, 59, 48, 0.18) !important; }

      .text-slate-100,
      .text-slate-200,
      .text-slate-300 { color: #1D1D1F !important; }
      .text-slate-400 { color: #424245 !important; }
      .text-slate-500,
      .text-slate-600,
      .text-slate-700 { color: #6E6E73 !important; }
      .text-slate-800 { color: #424245 !important; }
      .placeholder-slate-700::placeholder { color: #A1A1A6 !important; }

      .hover\:bg-slate-900:hover,
      .hover\:bg-slate-800:hover,
      .hover\:bg-slate-800\/30:hover,
      .hover\:bg-slate-800\/50:hover { background-color: #F5F5F7 !important; }
      .hover\:text-slate-300:hover,
      .hover\:text-slate-100:hover { color: #1D1D1F !important; }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-window": "https://esm.sh/react-window@^1.8.10",
    "react-virtualized-auto-sizer": "https://esm.sh/react-virtualized-auto-sizer@^1.0.24"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased selection:bg-cyan-100 selection:text-cyan-900">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
